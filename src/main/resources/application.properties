# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quickbite}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=QuickBiteSecretKey2024SuperLongStringForSecurity
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Server
server.port=${PORT:8080}